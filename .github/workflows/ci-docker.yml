name: CI - Build and Test with Docker

on:
  push:
    branches: [ master, main, feature/*, fix/* ]
  pull_request:
    branches: [ master, main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build Docker image (builder stage)
      uses: docker/build-push-action@v5
      with:
        context: .
        target: builder
        load: true
        tags: traffic-sim:builder
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Run tests in Docker
      run: |
        docker run --rm traffic-sim:builder ./build/traffic_simulation_tests --gtest_output=xml:/app/build/test_results.xml

    - name: Upload test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results
        path: /tmp/test_results.xml

    - name: Build runtime Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        target: runtime
        tags: traffic-sim:latest
        cache-from: type=gha

  # Job to verify the build works without Docker (native Ubuntu)
  native-build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential cmake libopencv-dev libgtest-dev

    - name: Build Google Test
      run: |
        cd /usr/src/googletest
        sudo cmake .
        sudo make
        sudo make install

    - name: Build project
      run: |
        mkdir build
        cd build
        cmake ..
        make -j$(nproc)

    - name: Run tests
      run: |
        cd build
        ./traffic_simulation_tests
