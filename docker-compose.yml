version: '3.8'

services:
  # Build and run tests
  test:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["--gtest_output=xml:/app/build/test_results.xml"]
    volumes:
      - ./build:/app/build

  # Interactive development shell
  dev:
    build:
      context: .
      dockerfile: Dockerfile
    command: /bin/bash
    stdin_open: true
    tty: true
    volumes:
      - .:/app
